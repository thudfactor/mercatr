<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercatr</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/main.css" />
</head>
<body>
  <header>
    <div class="header-text">
      <h1>Mercatr</h1>
      <p>Thematic playlist generator</p>
    </div>
    <button type="button" id="history-btn" aria-expanded="false" aria-haspopup="true">
      History<span id="history-count" aria-hidden="true"></span>
    </button>
  </header>

  <main>
    <nav role="tablist" aria-label="Query mode">
      <button role="tab" id="tab-explore" aria-selected="true" aria-controls="panel-explore">Explore</button>
      <button role="tab" id="tab-bridge" aria-selected="false" aria-controls="panel-bridge">Bridge</button>
      <button role="tab" id="tab-theme" aria-selected="false" aria-controls="panel-theme">Theme</button>
    </nav>

    <section role="tabpanel" id="panel-explore" aria-labelledby="tab-explore" class="active">
      <form id="form-explore">
        <div class="field">
          <label for="explore-artist">Artist</label>
          <input type="text" id="explore-artist" name="artist" placeholder="e.g. Elliott Smith" required>
        </div>
        <div class="field">
          <label for="explore-track">Track <span style="color:#555">(optional)</span></label>
          <input type="text" id="explore-track" name="track" placeholder="e.g. Between the Bars">
        </div>
        <div class="field">
          <label for="explore-voice">Voice <span style="color:#555">(optional)</span></label>
          <select id="explore-voice" name="voice">
            <option value="">Voice (optional)</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <section role="tabpanel" id="panel-bridge" aria-labelledby="tab-bridge">
      <form id="form-bridge">
        <div class="field">
          <label for="bridge-from">From artist</label>
          <input type="text" id="bridge-from" name="from" placeholder="e.g. Nick Drake" required>
        </div>
        <div class="field">
          <label for="bridge-to">To artist</label>
          <input type="text" id="bridge-to" name="to" placeholder="e.g. Frank Ocean" required>
        </div>
        <div class="field">
          <label for="bridge-voice">Voice <span style="color:#555">(optional)</span></label>
          <select id="bridge-voice" name="voice">
            <option value="">Voice (optional)</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <section role="tabpanel" id="panel-theme" aria-labelledby="tab-theme">
      <form id="form-theme">
        <div class="field">
          <label for="theme-input">Theme</label>
          <input type="text" id="theme-input" name="theme" placeholder="e.g. loneliness in crowded places" required>
        </div>
        <div class="field">
          <label for="theme-seed">Seed artist <span style="color:#555">(optional)</span></label>
          <input type="text" id="theme-seed" name="seedArtist" placeholder="e.g. Bon Iver">
        </div>
        <div class="field">
          <label for="theme-voice">Voice <span style="color:#555">(optional)</span></label>
          <select id="theme-voice" name="voice">
            <option value="">Voice (optional)</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <p id="waiting-song" aria-live="polite"></p>

    <p id="correction-notice" class="correction-notice" hidden></p>

    <div id="results" class="results" hidden></div>

    <div id="actions" class="actions" hidden>
      <button type="button" class="download-btn" id="download-xspf">Download XSPF</button>
    </div>
  </main>

  <footer>
    <a href="https://github.com/thudfactor/mercatr/" target="_blank" rel="noopener noreferrer">thudfactor/mercatr</a>
    <dl id="footer-models" aria-label="Active models">
      <div>
        <dt>Playlist</dt>
        <dd id="footer-model-main"></dd>
      </div>
      <div>
        <dt>Processing</dt>
        <dd id="footer-model-processing"></dd>
      </div>
    </dl>
  </footer>

  <dialog id="error-dialog" aria-labelledby="error-title">
    <div class="dialog-inner">
      <h2 id="error-title">Error</h2>
      <p id="error-message"></p>
    </div>
    <div class="dialog-actions">
      <button type="button" id="error-close">Dismiss</button>
    </div>
  </dialog>

  <div id="toast" role="status" aria-live="polite" hidden></div>

  <aside id="history-drawer" aria-label="Session history" inert>
    <div class="drawer-header">
      <h2>History</h2>
      <button type="button" id="drawer-close" class="drawer-close" aria-label="Close history">×</button>
    </div>
    <div id="drawer-body" class="drawer-body">
      <div id="history-list-view">
        <div id="session-list-container"></div>
        <div class="drawer-settings">
          <p id="storage-info"></p>
          <button type="button" id="clear-history-btn" class="clear-btn" hidden>Clear History</button>
        </div>
      </div>
      <div id="history-detail-view" hidden>
        <div class="detail-header">
          <button type="button" id="detail-back" class="detail-back">← Back</button>
          <h3 id="detail-name"></h3>
          <p id="detail-meta" class="detail-meta"></p>
        </div>
        <div class="detail-content">
          <div id="detail-results" class="results"></div>
        </div>
        <div class="detail-actions">
          <button type="button" id="detail-download" class="download-btn">Download XSPF</button>
        </div>
      </div>
    </div>
  </aside>

  <div id="drawer-backdrop" hidden></div>

  <script>
    const WAITING_SONGS = [
      { artist: "Tom Waits", title: "The Heart of Saturday Night" },
      { artist: "Elliott Smith", title: "Waiting for the Sun" },
      { artist: "The National", title: "Bloodhail" },
      { artist: "Nick Drake", title: "Northern Sky" },
      { artist: "Radiohead", title: "Paranoid Android" },
      { artist: "Bon Iver", title: "Holocene" },
      { artist: "Leonard Cohen", title: "Waiting for the Miracle" },
      { artist: "PJ Harvey", title: "Down by the Water" },
      { artist: "Jeff Buckley", title: "Hallelujah" },
      { artist: "The Smiths", title: "There Is a Light That Never Goes Out" },
      { artist: "Hank Williams", title: "I'm So Lonesome I Could Cry" },
      { artist: "Wilco", title: "Jesus, Etc." },
      { artist: "Big Red Machine", title: "Crying Again" },
      { artist: "Thom Yorke", title: "Harrowdown Hill" },
      { artist: "Iron & Wine", title: "Naked As We Came" },
      { artist: "The Cure", title: "Just Like Heaven" },
      { artist: "Nirvana", title: "Come As You Are" },
      { artist: "My Bloody Valentine", title: "Sometimes" },
      { artist: "Pavement", title: "Gold Soundz" },
      { artist: "Guided by Voices", title: "Tunic (Song for Karen)" },
      { artist: "Sigur Rós", title: "Starálfur" },
      { artist: "Low Roar", title: "I'll Keep Coming" },
      { artist: "Pinback", title: "Non-Photo Blue" },
      { artist: "Modest Mouse", title: "Ocean Breathes Salty" },
      { artist: "Built to Spill", title: "Carry Me" },
      { artist: "Explosions in the Sky", title: "Your Hand in Mine" },
      { artist: "Godspeed You! Black Emperor", title: "Storm" },
      { artist: "Arca", title: "Nonbinary" },
      { artist: "ANOHNI", title: "4 Degrees" },
      { artist: "Grimes", title: "We Appreciate Power" },
      { artist: "FKA twigs", title: "Two Weeks" },
      { artist: "James Blake", title: "Retrograde" },
      { artist: "Jon Hopkins", title: "Open Eye Signal" },
      { artist: "Caribou", title: "Odessa" },
      { artist: "Ólafur Arnalds", title: "Near Light" },
      { artist: "Nils Frahm", title: "All Melody" },
      { artist: "Aphex Twin", title: "Windowlicker" },
      { artist: "Burial", title: "Archangel" },
      { artist: "Rustie", title: "Glass Swords" },
      { artist: "Four Tet", title: "There is Love in You" },
      { artist: "Boards of Canada", title: "Everything Painted in Cold Blue" },
      { artist: "Múm", title: "Green Grass of Tunnel" },
      { artist: "Jlin", title: "Black Origami" },
      { artist: "Holly Herndon", title: "GODMOTHER" },
      { artist: "Yves Tumor", title: "Gospel For a New Century" },
      { artist: "Oneohtrix Point Never", title: "Replica" },
      { artist: "William Basinski", title: "The Disintegration Loops I" },
      { artist: "Alva Noto", title: "Unitxt" },
      { artist: "Ryoji Ikeda", title: "Data-verse" },
      { artist: "Laurie Spiegel", title: "The Expanding Universe" },
    ];

    // === LocalStorage availability ===
    let storageAvailable = false;
    (function () {
      try {
        const key = '__mercatr_test__';
        localStorage.setItem(key, '1');
        localStorage.getItem(key);
        localStorage.removeItem(key);
        storageAvailable = true;
      } catch {
        storageAvailable = false;
      }
    })();

    // === Storage service ===
    const STORAGE_KEY = 'mercatr:sessions';
    const SESSION_LIMIT = 50;

    function enforceRetentionLimit(sessions, limit = SESSION_LIMIT) {
      return sessions.slice(0, limit);
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        console.warn('mercatr: failed to parse session history from storage');
        return [];
      }
    }

    function saveSession(session) {
      try {
        const existing = loadSessions();
        const updated = enforceRetentionLimit([session, ...existing], SESSION_LIMIT);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        return { success: true };
      } catch (e) {
        if (e instanceof DOMException && e.name === 'QuotaExceededError') {
          return { success: false, error: 'storage_full' };
        }
        return { success: false, error: 'unknown' };
      }
    }

    function clearSessions() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function estimateStorageUsed() {
      const raw = localStorage.getItem(STORAGE_KEY) ?? '';
      return new Blob([raw]).size;
    }

    // === Session naming ===
    function toTitleCase(str) {
      return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.slice(1).toLowerCase());
    }

    function computeDisplayName(mode, inputs) {
      const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (mode === 'artist') return `Artist: ${toTitleCase(inputs.artist)} — ${date}`;
      if (mode === 'theme') return `Theme: ${toTitleCase(inputs.theme)} — ${date}`;
      return `${toTitleCase(inputs.artistFrom)} → ${toTitleCase(inputs.artistTo)} — ${date}`;
    }

    // === Element refs ===
    const tabs = document.querySelectorAll('[role="tab"]');
    const panels = document.querySelectorAll('[role="tabpanel"]');
    const correctionNotice = document.getElementById('correction-notice');
    const resultsEl = document.getElementById('results');
    const actionsEl = document.getElementById('actions');
    const downloadBtn = document.getElementById('download-xspf');
    const errorDialog = document.getElementById('error-dialog');
    const errorMessage = document.getElementById('error-message');
    const errorClose = document.getElementById('error-close');
    const historyBtn = document.getElementById('history-btn');
    const historyCount = document.getElementById('history-count');
    const toast = document.getElementById('toast');
    const drawer = document.getElementById('history-drawer');
    const drawerBody = document.getElementById('drawer-body');
    const drawerBackdrop = document.getElementById('drawer-backdrop');
    const drawerClose = document.getElementById('drawer-close');
    const historyListView = document.getElementById('history-list-view');
    const historyDetailView = document.getElementById('history-detail-view');
    const detailBack = document.getElementById('detail-back');
    const detailDownload = document.getElementById('detail-download');

    let lastResponse = null;
    let lastTracks = null;
    let lastTitle = null;
    let toastTimer = null;
    let waitingSongInterval = null;
    const waitingSongEl = document.getElementById('waiting-song');
    let savedScrollTop = 0;
    let currentDetailSession = null;

    // === Waiting song ===
    function showWaitingSong() {
      const current = waitingSongEl.textContent;
      const pool = WAITING_SONGS.filter(s => `"${s.title}" — ${s.artist}` !== current);
      const song = pool[Math.floor(Math.random() * pool.length)];
      waitingSongEl.classList.remove('visible');
      setTimeout(() => {
        waitingSongEl.textContent = `"${song.title}" — ${song.artist}`;
        waitingSongEl.classList.add('visible');
      }, 300);
    }

    function startWaitingSong() {
      showWaitingSong();
      waitingSongInterval = setInterval(showWaitingSong, 5000);
    }

    function stopWaitingSong() {
      clearInterval(waitingSongInterval);
      waitingSongInterval = null;
      waitingSongEl.classList.remove('visible');
      setTimeout(() => { waitingSongEl.textContent = ''; }, 600);
    }

    // === Toast ===
    function showToast(message, isError = false) {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.toggle('toast-error', isError);
      toast.hidden = false;
      toastTimer = setTimeout(() => { toast.hidden = true; }, 3000);
    }

    // === History count badge ===
    function updateHistoryCount() {
      if (!storageAvailable) return;
      const count = loadSessions().length;
      historyCount.textContent = count > 0 ? ` (${count})` : '';
    }

    // === Error dialog ===
    errorClose.addEventListener('click', () => errorDialog.close());

    function showError(msg) {
      errorMessage.textContent = msg;
      errorDialog.showModal();
    }

    // === Tab switching ===
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
        panels.forEach(p => p.classList.remove('active'));
        tab.setAttribute('aria-selected', 'true');
        document.getElementById(tab.getAttribute('aria-controls')).classList.add('active');
        clearResults();
      });
    });

    // === Results ===
    function clearResults() {
      correctionNotice.hidden = true;
      resultsEl.hidden = true;
      actionsEl.hidden = true;
      lastResponse = null;
      lastTracks = null;
      lastTitle = null;
      downloadBtn.disabled = true;
    }

    function buildTrackList(tracks) {
      const ol = document.createElement('ol');
      ol.className = 'track-list';
      ol.setAttribute('aria-label', 'Recommended tracks');
      tracks.forEach((t, i) => {
        const li = document.createElement('li');
        const num = document.createElement('span');
        num.className = 'track-num';
        num.textContent = `${i + 1}.`;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'track-title';
        const a = document.createElement('a');
        a.href = `https://www.last.fm/music/${encodeURIComponent(t.artist)}/_/${encodeURIComponent(t.track)}`;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = t.track;
        titleSpan.appendChild(a);
        const artistSpan = document.createElement('span');
        artistSpan.className = 'track-artist';
        artistSpan.textContent = `— ${t.artist}`;
        const parts = [t.album, t.year].filter(Boolean);
        li.appendChild(num);
        li.appendChild(titleSpan);
        li.appendChild(artistSpan);
        if (parts.length > 0) {
          const meta = document.createElement('span');
          meta.className = 'track-meta';
          meta.textContent = parts.join(' · ');
          li.appendChild(meta);
        }
        ol.appendChild(li);
      });
      return ol;
    }

    function showResults(data, title, mode, inputs) {
      lastResponse = data.response;
      lastTracks = data.tracks ?? null;
      lastTitle = title;

      if (data.resolvedArtist) {
        const original = Array.isArray(data.originalInput)
          ? data.originalInput.join(' / ')
          : data.originalInput;
        const resolved = Array.isArray(data.resolvedArtist)
          ? data.resolvedArtist.join(' / ')
          : data.resolvedArtist;
        correctionNotice.innerHTML = `Artist name corrected: <em>${original}</em> → <em>${resolved}</em>`;
        correctionNotice.hidden = false;
      } else {
        correctionNotice.hidden = true;
      }

      resultsEl.innerHTML = marked.parse(data.response);
      if (lastTracks && lastTracks.length > 0) {
        resultsEl.appendChild(buildTrackList(lastTracks));
      }
      resultsEl.hidden = false;
      actionsEl.hidden = false;
      downloadBtn.disabled = !lastTracks;

      if (storageAvailable && mode && inputs) {
        const session = {
          id: crypto.randomUUID(),
          mode,
          inputs,
          playlist: [],
          tracks: lastTracks,
          commentary: data.response,
          createdAt: new Date().toISOString(),
          displayName: computeDisplayName(mode, inputs),
        };
        const result = saveSession(session);
        if (result.success) {
          showToast('Session saved to history.');
          updateHistoryCount();
        } else if (result.error === 'storage_full') {
          showToast("Couldn't save session — storage full. Clear your history in Settings to free space.", true);
        }
      }
    }

    function setLoading(form, loading) {
      const btn = form.querySelector('[type="submit"]');
      btn.disabled = loading;
      btn.textContent = loading ? 'Generating…' : 'Generate';
    }

    async function submitForm(endpoint, body, title, mode, inputs) {
      clearResults();
      const activeForm = document.querySelector('.active form');
      setLoading(activeForm, true);
      startWaitingSong();

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error ?? 'An unexpected error occurred.');
          return;
        }

        showResults(data, title, mode, inputs);
      } catch {
        showError('Network error. Please try again.');
      } finally {
        setLoading(activeForm, false);
        stopWaitingSong();
      }
    }

    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('reset', () => clearResults());
    });

    document.getElementById('form-explore').addEventListener('submit', e => {
      e.preventDefault();
      const artist = e.target.artist.value.trim();
      const track = e.target.track.value.trim();
      const voice = e.target['explore-voice']?.value || undefined;
      submitForm('/api/explore', { artist, ...(track ? { track } : {}), ...(voice ? { voice } : {}) }, artist, 'artist', { artist });
    });

    document.getElementById('form-bridge').addEventListener('submit', e => {
      e.preventDefault();
      const from = e.target.from.value.trim();
      const to = e.target.to.value.trim();
      const voice = e.target['bridge-voice']?.value || undefined;
      submitForm('/api/bridge', { from, to, ...(voice ? { voice } : {}) }, `${from} → ${to}`, 'transition', { artistFrom: from, artistTo: to });
    });

    document.getElementById('form-theme').addEventListener('submit', e => {
      e.preventDefault();
      const theme = e.target.theme.value.trim();
      const seedArtist = e.target.seedArtist.value.trim();
      const voice = e.target['theme-voice']?.value || undefined;
      submitForm('/api/theme', { theme, ...(seedArtist ? { seedArtist } : {}), ...(voice ? { voice } : {}) }, theme, 'theme', { theme });
    });

    // === XSPF download (shared) ===
    async function downloadXspf(tracks, title, btn) {
      btn.disabled = true;
      btn.textContent = 'Downloading…';

      try {
        const res = await fetch('/api/xspf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tracks, title }),
        });

        if (!res.ok) {
          const data = await res.json();
          showError(data.error ?? 'Failed to generate XSPF.');
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'playlist.xspf';
        a.click();
        URL.revokeObjectURL(url);
      } catch {
        showError('Failed to download XSPF.');
      } finally {
        btn.disabled = !lastTracks;
        btn.textContent = 'Download XSPF';
      }
    }

    downloadBtn.addEventListener('click', function () {
      if (!lastTracks || !lastTitle) return;
      downloadXspf(lastTracks, lastTitle, this);
    });

    detailDownload.addEventListener('click', function () {
      if (!currentDetailSession?.tracks) return;
      downloadXspf(currentDetailSession.tracks, currentDetailSession.displayName, this);
    });

    // === History drawer ===
    function openDrawer() {
      drawer.classList.add('open');
      drawer.removeAttribute('inert');
      drawerBackdrop.hidden = false;
      historyBtn.setAttribute('aria-expanded', 'true');
      renderSessionList();
      drawerClose.focus();
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      drawer.setAttribute('inert', '');
      drawerBackdrop.hidden = true;
      historyBtn.setAttribute('aria-expanded', 'false');
      historyBtn.focus();
    }

    historyBtn.addEventListener('click', openDrawer);
    drawerClose.addEventListener('click', closeDrawer);
    drawerBackdrop.addEventListener('click', closeDrawer);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
    });

    drawer.addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      const focusable = [...drawer.querySelectorAll(
        'button:not([disabled]), a[href], input:not([disabled]), [tabindex]:not([tabindex="-1"])'
      )].filter(el => !el.closest('[hidden]'));
      if (focusable.length === 0) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    // === Session list ===
    function renderSessionList() {
      const sessions = loadSessions();

      historyListView.hidden = false;
      historyDetailView.hidden = true;

      const storageInfo = document.getElementById('storage-info');
      const clearBtn = document.getElementById('clear-history-btn');

      if (sessions.length > 0) {
        const kb = Math.round(estimateStorageUsed() / 1024);
        storageInfo.textContent = `${sessions.length} session${sessions.length === 1 ? '' : 's'} · ~${kb}KB used`;
        clearBtn.hidden = false;
      } else {
        storageInfo.textContent = '';
        clearBtn.hidden = true;
      }

      const container = document.getElementById('session-list-container');

      if (sessions.length === 0) {
        container.innerHTML = '<p class="drawer-empty">No sessions saved yet. Complete a mode run to save your first session.</p>';
        return;
      }

      const ol = document.createElement('ol');
      ol.id = 'session-list';

      sessions.forEach(session => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = session.displayName;
        btn.dataset.sessionId = session.id;
        btn.addEventListener('click', () => {
          savedScrollTop = drawerBody.scrollTop;
          renderSessionDetail(session);
        });
        li.appendChild(btn);
        ol.appendChild(li);
      });

      container.innerHTML = '';
      container.appendChild(ol);
    }

    // === Session detail ===
    function formatMeta(session) {
      if (session.mode === 'artist') return `Artist exploration · ${session.inputs.artist}`;
      if (session.mode === 'theme') return `Theme · ${session.inputs.theme}`;
      return `Transition · ${session.inputs.artistFrom} → ${session.inputs.artistTo}`;
    }

    function renderSessionDetail(session) {
      currentDetailSession = session;
      historyListView.hidden = true;
      historyDetailView.hidden = false;

      document.getElementById('detail-name').textContent = session.displayName;
      document.getElementById('detail-meta').textContent = formatMeta(session);
      document.getElementById('detail-results').innerHTML = marked.parse(session.commentary);
      detailDownload.disabled = !session.tracks;

      drawerBody.scrollTop = 0;
      detailBack.focus();
    }

    detailBack.addEventListener('click', () => {
      historyListView.hidden = false;
      historyDetailView.hidden = true;
      currentDetailSession = null;
      drawerBody.scrollTop = savedScrollTop;
    });

    // === Clear history ===
    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (!confirm('Clear all session history? This cannot be undone.')) return;
      clearSessions();
      updateHistoryCount();
      renderSessionList();
    });

    // === Config (model name) ===
    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) return;
        const { model, processingModel } = await res.json();
        document.getElementById('footer-model-main').textContent = model;
        document.getElementById('footer-model-processing').textContent = processingModel;
      } catch { /* non-critical */ }
    }

    // === Voices ===
    async function loadVoices() {
      try {
        const res = await fetch('/api/voices');
        if (!res.ok) return;
        const { voices } = await res.json();
        const selects = ['explore-voice', 'bridge-voice', 'theme-voice'];
        selects.forEach(id => {
          const sel = document.getElementById(id);
          voices.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id;
            opt.textContent = v.label;
            opt.title = v.description ?? '';
            sel.appendChild(opt);
          });
        });
      } catch { /* voices unavailable — dropdown stays empty */ }
    }

    // === Init ===
    if (!storageAvailable) {
      historyBtn.disabled = true;
      historyBtn.title = 'History unavailable in this browser context.';
    } else {
      updateHistoryCount();
    }
    loadVoices();
    loadConfig();
  </script>
</body>
</html>
