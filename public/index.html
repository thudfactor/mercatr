<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercatr</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #2a2a2a;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
    }

    header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.2rem;
    }

    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    nav[role="tablist"] {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
    }

    button[role="tab"] {
      background: none;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
    }

    button[role="tab"]:hover { color: #ccc; border-color: #444; }

    button[role="tab"][aria-selected="true"] {
      background: #1e1e1e;
      color: #fff;
      border-color: #555;
    }

    section[role="tabpanel"] { display: none; }
    section[role="tabpanel"].active { display: block; }

    form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #aaa;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input[type="text"] {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e8e8e8;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #555;
    }

    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    button[type="submit"], button[type="reset"] {
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.65rem 1.25rem;
      transition: background 0.15s;
    }

    button[type="submit"] {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
    }

    button[type="reset"] {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
    }

    button[type="submit"]:hover:not(:disabled) { background: #333; }
    button[type="reset"]:hover { color: #aaa; border-color: #444; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .correction-notice {
      font-size: 0.82rem;
      color: #888;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      margin-top: 1.5rem;
    }

    .correction-notice em { color: #aaa; font-style: normal; }

    .results {
      margin-top: 1.5rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .results h1, .results h2, .results h3 {
      color: #ddd;
      margin: 1rem 0 0.4rem;
      font-size: 1rem;
    }

    .results h1:first-child, .results h2:first-child { margin-top: 0; }

    .results p { color: #bbb; margin: 0.4rem 0; }

    .results ul, .results ol {
      padding-left: 1.25rem;
      color: #bbb;
    }

    .results li { margin: 0.2rem 0; }

    .results strong { color: #ddd; }

    .results em { color: #999; }

    .results hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 1rem 0;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .download-btn {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 4px;
      color: #8aba8a;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.5rem 0.9rem;
      transition: background 0.15s;
    }

    .download-btn:hover { background: #223322; }

    dialog {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      max-width: 440px;
      width: 90%;
      padding: 0;
    }

    dialog::backdrop { background: rgba(0, 0, 0, 0.6); }

    .dialog-inner { padding: 1.5rem; }

    .dialog-inner h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #e88;
    }

    .dialog-inner p {
      font-size: 0.9rem;
      color: #bbb;
      line-height: 1.5;
    }

    .dialog-actions { padding: 0.75rem 1.5rem; border-top: 1px solid #2a2a2a; }

    .dialog-actions button {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.45rem 0.9rem;
    }

    .dialog-actions button:hover { background: #333; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>Mercatr</h1>
    <p>Thematic playlist generator</p>
  </header>

  <main>
    <nav role="tablist" aria-label="Query mode">
      <button role="tab" id="tab-explore" aria-selected="true" aria-controls="panel-explore">Explore</button>
      <button role="tab" id="tab-bridge" aria-selected="false" aria-controls="panel-bridge">Bridge</button>
      <button role="tab" id="tab-theme" aria-selected="false" aria-controls="panel-theme">Theme</button>
    </nav>

    <section role="tabpanel" id="panel-explore" aria-labelledby="tab-explore" class="active">
      <form id="form-explore">
        <div class="field">
          <label for="explore-artist">Artist</label>
          <input type="text" id="explore-artist" name="artist" placeholder="e.g. Elliott Smith" required>
        </div>
        <div class="field">
          <label for="explore-track">Track <span style="color:#555">(optional)</span></label>
          <input type="text" id="explore-track" name="track" placeholder="e.g. Between the Bars">
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <section role="tabpanel" id="panel-bridge" aria-labelledby="tab-bridge">
      <form id="form-bridge">
        <div class="field">
          <label for="bridge-from">From artist</label>
          <input type="text" id="bridge-from" name="from" placeholder="e.g. Nick Drake" required>
        </div>
        <div class="field">
          <label for="bridge-to">To artist</label>
          <input type="text" id="bridge-to" name="to" placeholder="e.g. Frank Ocean" required>
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <section role="tabpanel" id="panel-theme" aria-labelledby="tab-theme">
      <form id="form-theme">
        <div class="field">
          <label for="theme-input">Theme</label>
          <input type="text" id="theme-input" name="theme" placeholder="e.g. loneliness in crowded places" required>
        </div>
        <div class="field">
          <label for="theme-seed">Seed artist <span style="color:#555">(optional)</span></label>
          <input type="text" id="theme-seed" name="seedArtist" placeholder="e.g. Bon Iver">
        </div>
        <div class="form-actions">
          <button type="submit">Generate</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </section>

    <p id="correction-notice" class="correction-notice" hidden></p>

    <div id="results" class="results" hidden></div>

    <div id="actions" class="actions" hidden>
      <button type="button" class="download-btn" id="download-xspf">Download XSPF</button>
    </div>
  </main>

  <dialog id="error-dialog" aria-labelledby="error-title">
    <div class="dialog-inner">
      <h2 id="error-title">Error</h2>
      <p id="error-message"></p>
    </div>
    <div class="dialog-actions">
      <button type="button" id="error-close">Dismiss</button>
    </div>
  </dialog>

  <script>
    const tabs = document.querySelectorAll('[role="tab"]');
    const panels = document.querySelectorAll('[role="tabpanel"]');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
        panels.forEach(p => p.classList.remove('active'));
        tab.setAttribute('aria-selected', 'true');
        document.getElementById(tab.getAttribute('aria-controls')).classList.add('active');
        clearResults();
      });
    });

    const correctionNotice = document.getElementById('correction-notice');
    const resultsEl = document.getElementById('results');
    const actionsEl = document.getElementById('actions');
    const downloadBtn = document.getElementById('download-xspf');
    const errorDialog = document.getElementById('error-dialog');
    const errorMessage = document.getElementById('error-message');
    const errorClose = document.getElementById('error-close');

    let lastResponse = null;
    let lastTitle = null;

    errorClose.addEventListener('click', () => errorDialog.close());

    function showError(msg) {
      errorMessage.textContent = msg;
      errorDialog.showModal();
    }

    function clearResults() {
      correctionNotice.hidden = true;
      resultsEl.hidden = true;
      actionsEl.hidden = true;
      lastResponse = null;
      lastTitle = null;
    }

    function showResults(data, title) {
      lastResponse = data.response;
      lastTitle = title;

      if (data.resolvedArtist) {
        const original = Array.isArray(data.originalInput)
          ? data.originalInput.join(' / ')
          : data.originalInput;
        const resolved = Array.isArray(data.resolvedArtist)
          ? data.resolvedArtist.join(' / ')
          : data.resolvedArtist;
        correctionNotice.innerHTML = `Artist name corrected: <em>${original}</em> → <em>${resolved}</em>`;
        correctionNotice.hidden = false;
      } else {
        correctionNotice.hidden = true;
      }

      resultsEl.innerHTML = marked.parse(data.response);
      resultsEl.hidden = false;
      actionsEl.hidden = false;
    }

    function setLoading(form, loading) {
      const btn = form.querySelector('[type="submit"]');
      btn.disabled = loading;
      btn.textContent = loading ? 'Generating…' : 'Generate';
    }

    async function submitForm(endpoint, body, title) {
      clearResults();
      const activeForm = document.querySelector('.active form');
      setLoading(activeForm, true);

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error ?? 'An unexpected error occurred.');
          return;
        }

        showResults(data, title);
      } catch {
        showError('Network error. Please try again.');
      } finally {
        setLoading(activeForm, false);
      }
    }

    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('reset', () => clearResults());
    });

    document.getElementById('form-explore').addEventListener('submit', e => {
      e.preventDefault();
      const artist = e.target.artist.value.trim();
      const track = e.target.track.value.trim();
      submitForm('/api/explore', { artist, ...(track ? { track } : {}) }, artist);
    });

    document.getElementById('form-bridge').addEventListener('submit', e => {
      e.preventDefault();
      const from = e.target.from.value.trim();
      const to = e.target.to.value.trim();
      submitForm('/api/bridge', { from, to }, `${from} → ${to}`);
    });

    document.getElementById('form-theme').addEventListener('submit', e => {
      e.preventDefault();
      const theme = e.target.theme.value.trim();
      const seedArtist = e.target.seedArtist.value.trim();
      submitForm('/api/theme', { theme, ...(seedArtist ? { seedArtist } : {}) }, theme);
    });

    downloadBtn.addEventListener('click', async () => {
      if (!lastResponse || !lastTitle) return;

      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Extracting…';

      try {
        const res = await fetch('/api/xspf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ response: lastResponse, title: lastTitle }),
        });

        if (!res.ok) {
          const data = await res.json();
          showError(data.error ?? 'Failed to generate XSPF.');
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'playlist.xspf';
        a.click();
        URL.revokeObjectURL(url);
      } catch {
        showError('Failed to download XSPF.');
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = 'Download XSPF';
      }
    });
  </script>
</body>
</html>
